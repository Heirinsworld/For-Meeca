<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Meeca 💌</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffd9e8, #fff0f6);
  font-family: Arial;
  overflow: hidden;
}

/* INTRO POPUP */
.intro {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 79, 129, 0.95);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  z-index: 10;
}

.intro button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff4f81;
  font-weight: bold;
  cursor: pointer;
}

/* ENVELOPE */
.scene {
  width: 300px;
  height: 220px;
  cursor: pointer;
  position: relative;
  display: none;
}

.envelope {
  position: absolute;
  width: 100%;
  height: 100%;
}

.back {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff7aa8;
  border-radius: 0 0 15px 15px;
}

.front {
  position: absolute;
  bottom: 0;
  border-left: 150px solid #ff5f95;
  border-right: 150px solid #ff5f95;
  border-top: 100px solid transparent;
  border-bottom: 100px solid #ff4f81;
}

.flap {
  position: absolute;
  border-left: 150px solid transparent;
  border-right: 150px solid transparent;
  border-top: 100px solid #ff8fb7;
  transform-origin: top;
  transition: 1s;
}

.letter {
  position: absolute;
  width: 260px;
  height: 160px;
  background: white;
  border-radius: 15px;
  left: 50%;
  transform: translateX(-50%);
  bottom: 10px;
  padding: 15px;
  text-align: center;
  transition: 1s;
  overflow: hidden;
}

.letter img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 10px;
}

.full {
  opacity: 0;
  transition: 1s;
  font-size: 14px;
}

.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  transform: translateX(-50%) translateY(-120px);
  height: 320px;
}

.open .full {
  opacity: 1;
}

.name {
  position: absolute;
  top: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  padding: 8px 15px;
  border-radius: 20px;
  color: #ff4f81;
  font-weight: bold;
}
</style>
</head>
<body>

<!-- INTRO SCREEN -->
<div class="intro" id="intro">
  <h2>Hey Meeca 🥺💖</h2>
  <p>I made something for you…</p>
  <button onclick="start()">Open it 💌</button>
</div>

<!-- ENVELOPE -->
<div class="scene" id="scene" onclick="toggle()">
  <div class="envelope" id="env">
    <div class="back"></div>

    <div class="letter">
      <img src="photo.jpg">

      <div class="full">
        Out of everyone in the world…<br><br>
        I’m so glad I chose you, <b>Jermeeca Wildschut</b> 💖<br><br>
        And I’d choose you again… every single time.<br><br>
        — Love, Heirin George 😘
      </div>
    </div>

    <div class="flap"></div>
    <div class="front"></div>
    <div class="name">Meeca 💕</div>
  </div>
</div>

<script>
function start() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("scene").style.display = "block";
}

function toggle() {
  document.getElementById("env").classList.toggle("open");
}
</script>

</body>
</html>
