<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Meeca 💌</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffd9e8, #fff0f6);
  font-family: Arial;
}

/* ENVELOPE */
.scene {
  width: 90vw;
  max-width: 350px;
  height: 260px;
  cursor: pointer;
  position: relative;
}

.envelope {
  width: 100%;
  height: 100%;
  position: relative;
}

.back {
  width: 100%;
  height: 100%;
  background: #ff7aa8;
  border-radius: 0 0 15px 15px;
}

.front {
  position: absolute;
  bottom: 0;
  width: 0;
  height: 0;
  border-left: 50% solid #ff5f95;
  border-right: 50% solid #ff5f95;
  border-top: 120px solid transparent;
  border-bottom: 120px solid #ff4f81;
}

.flap {
  position: absolute;
  width: 0;
  height: 0;
  border-left: 50% solid transparent;
  border-right: 50% solid transparent;
  border-top: 120px solid #ff8fb7;
  transform-origin: top;
  transition: 1s;
}

/* LETTER */
.letter {
  position: absolute;
  width: 90%;
  left: 50%;
  transform: translateX(-50%);
  bottom: 10px;
  background: white;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  transition: 1s;
}

.letter img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 10px;
}

.full {
  opacity: 0;
  transition: 1s;
  font-size: 15px;
}

/* OPEN */
.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  transform: translateX(-50%) translateY(-140px);
}

.open .full {
  opacity: 1;
}

.name {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  padding: 8px 15px;
  border-radius: 20px;
  color: #ff4f81;
  font-weight: bold;
}

/* BUTTON */
.continue-btn {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4f81;
  color: white;
  cursor: pointer;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.yes {
  background: #ff4f81;
  color: white;
}

.no {
  background: grey;
  color: white;
  position: relative;
}
</style>
</head>

<body>

<div class="scene" onclick="openLetter()">
  <div class="envelope" id="env">
    
    <div class="back"></div>

    <div class="letter">
      <img src="photo.jpg">

      <div class="full">
        Out of everyone in the world…<br><br>
        I’m so glad I chose you, <b>Jermeeca Wildschut</b> 💖<br><br>
        And I’d choose you again… every single time.<br><br>
        — Love, Heirin George 😘
        
        <br><br>
        <button class="continue-btn" onclick="showPopup(event)">
          Continue 💖
        </button>
      </div>
    </div>

    <div class="flap"></div>
    <div class="front"></div>
    <div class="name">Meeca 💕</div>

  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="box">
    <h3>Will you be mine forever? 💖</h3>
    <button class="yes" onclick="yes()">YES 😍</button>
    <button class="no" id="noBtn">NO 😈</button>
  </div>
</div>

<script>
function openLetter() {
  document.getElementById("env").classList.add("open");
}

function showPopup(e) {
  e.stopPropagation();
  document.getElementById("popup").style.display = "flex";
}

function yes() {
  alert("I knew it 😘💖");
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * 200 - 100;
  const y = Math.random() * 200 - 100;
  noBtn.style.transform = `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
